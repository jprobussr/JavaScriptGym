<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tip Calculator</title>
    <link rel="stylesheet" href="./style.css" />
  </head>

  
  <body class="dark">
    <header>
      <div class="header-inner">
        <div class="logo">JS Gym</div>
        <button id="themeToggle">Toggle Theme</button>
      </div>
    </header>

    <main class="container">
      <h1>Tip Calculator</h1>

      <form id="tipForm">
        <label for="bill">Bill Amount</label>
        <input
          type="number"
          id="bill"
          name="bill"
          placeholder="e.g. 42.50"
          min="0"
          step="0.01"
        />

        <label for="tip">Tip %</label>
        <input
          type="number"
          id="tip"
          name="tip"
          placeholder="e.g. 20"
          min="0"
          step="1"
          value="20"
        />

        <label for="people">People</label>
        <input
          type="number"
          name="people"
          id="people"
          min="1"
          step="1"
          value="1"
        />

        <button type="submit" id="calculateBtn">Calculate Tip</button>
      </form>

      <section class="results">
        <h2>Results</h2>
        <p>Tip: <strong id="tipAmount">$0.00</strong></p>
        <p>Total: <strong id="totalAmount">$0.00</strong></p>
        <p>Per person: <strong id="perPerson">$0.00</strong></p>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
