<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="light">
    <header class="site-header">
      <div class="container header-inner">
        <p class="logo">JS Gym</p>

        <button id="themeToggle" aria-label="Toggle theme" aria-pressed="false">🌙</button>
      </div>
    </header>

    <main class="main-content">
      <div class="container">
        <section class="todo-card">
          <h1>To-Do List</h1>
          <p>Add a task, mark it complete, or delete it.</p>

          <form id="taskForm" class="todo-controls">
            <input
              type="text"
              id="taskInput"
              placeholder="Enter a task"
              aria-label="Enter a task"
            />
            <button type="submit" id="addTaskBtn">Add</button>
          </form>

          <ul id="taskList"></ul>

          <p id="taskCount">Tasks: 0</p>
        </section>
      </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>Built for JavaScript practice.</p>
        </div>
    </footer>

    <script src="./script.js"></script>
  </body>
</html>
