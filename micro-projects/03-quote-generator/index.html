<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quote Generator</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="dark">
    <header class="site-header">
      <div class="header-inner">
        <h1 class="logo">JS Gym</h1>
        <button id="themeToggle">Theme Toggle</button>
      </div>
    </header>

    <main class="container">
        <div class="card quote-card">
            <p id="quoteText">Click the button to generate a quote.</p>
            <p id="quoteAuthor">- Unknown</p>
            <button id="newQuoteBtn">New Quote</button>
        </div>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <p>&copy; John - JS Gym</p>
      </div>
    </footer>

    <script src="./app.js"></script>
  </body>
</html>
